<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jswebart</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="fav_black1.png" type="image/x-icon">
  </head>
  <body>
    <!-- HEADER START **************************************** -->
    <header id="header">
      <div id="header-wrapper">
        <div id="logo">
          <img src="./jswebart_logo.svg" alt="">
          <span class="company_name">JSwebart</span>
        </div>
        <nav id="navbar">
          <a class="navlink" href="#">About</a>
          <a class="navlink" href="#">Service</a>
          <a class="navlink" href="#">Work</a>
          <a class="navlink" href="#">Blog</a>
          <a class="navlink" href="#" id="contact">Contact Us</a>
        </nav>
      </div>
    </header>
    <!-- HEADER END **************************************** -->

    <!-- HERO SECTION START ******************************** -->
     <section id="hero_section">
      <div id="hero_left">
      
      <h1 id="hero_title">We Craft <span>Impactful Brands</span>, Connect Customers With <span>Result Oriented</span> Marketing Strategies</h1>
      <p id="hero_para"> our strategies make your brand stands out in the competitive market. Let's work together and build a powerful brand that drive growth to your business.</p>
      <a href="#" id="hero_work_btn">Our Work</a>
    </div>
    <div id="hero_right">
      <div id="block_one"><img src="abstract1.jpg" alt=""></div>
      <div id="block_two"><video src="./hero_video.mp4" autoplay loop muted></video></div>
      <div id="block_three"><img src="abstract2.jpg" alt=""></div>
    </div>
     </section>
    <!-- HERO SECTION END ******************************** -->

    <script src="index.js"></script>
  </body>
</html>
